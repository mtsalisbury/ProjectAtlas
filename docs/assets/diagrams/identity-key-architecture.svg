<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc"><title id="title">Identity and key architecture</title><desc id="desc">Cryptographic user keys, optional biometrics and recovery guardians feed a user-controlled identity vault. The vault produces signed assertions for applications, device authorization, network access and transactions.</desc><defs><style>.t{font-family:Inter,Arial,sans-serif;fill:#121b35}.h{font-size:28px;font-weight:800}.l{font-size:20px;font-weight:700}.s{font-size:16px}.b{fill:#fff;stroke:#121b35;stroke-width:2.5}.soft{fill:#eef0ff;stroke:#5659dd;stroke-width:3}.a{stroke:#121b35;stroke-width:3;fill:none;marker-end:url(#m)}.d{stroke:#5659dd;stroke-width:3;stroke-dasharray:8 7;fill:none;marker-end:url(#mb)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#121b35"/></marker><marker id="mb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#5659dd"/></marker></defs><rect width="1200" height="680" fill="#fff"/><text class="t h" x="50" y="55">Identity and Key Architecture</text><rect class="b" x="55" y="130" width="270" height="400" rx="20"/><text class="t l" x="190" y="170" text-anchor="middle">Identity Sources</text><g class="t s"><rect class="soft" x="85" y="205" width="210" height="72" rx="12"/><text x="190" y="235" text-anchor="middle">User Keys</text><text x="190" y="259" text-anchor="middle">Cryptographic</text><rect class="b" x="85" y="300" width="210" height="72" rx="12"/><text x="190" y="330" text-anchor="middle">Biometric</text><text x="190" y="354" text-anchor="middle">Optional local unlock</text><rect class="b" x="85" y="395" width="210" height="72" rx="12"/><text x="190" y="425" text-anchor="middle">Recovery</text><text x="190" y="449" text-anchor="middle">Guardians / escrow</text></g><path class="a" d="M325 330 H445"/>
<circle class="soft" cx="580" cy="330" r="115"/><path d="M548 307 v-28 a32 32 0 0 1 64 0 v28" fill="none" stroke="#5659dd" stroke-width="10"/><rect x="535" y="300" width="90" height="82" rx="15" fill="#5659dd"/><circle cx="580" cy="334" r="10" fill="#fff"/><rect x="575" y="340" width="10" height="22" fill="#fff"/><text class="t l" x="580" y="420" text-anchor="middle">Identity Vault</text><rect class="soft" x="460" y="520" width="240" height="80" rx="14"/><text class="t l" x="580" y="552" text-anchor="middle">User Controlled</text><text class="t s" x="580" y="578" text-anchor="middle">Portable · revocable · recoverable</text><path class="d" d="M580 445 V520"/>
<rect class="b" x="850" y="110" width="290" height="450" rx="20"/><text class="t l" x="995" y="150" text-anchor="middle">Use Anywhere</text><g class="t s"><rect class="b" x="885" y="190" width="220" height="62" rx="12"/><text x="995" y="228" text-anchor="middle">Sign in to applications</text><rect class="b" x="885" y="275" width="220" height="62" rx="12"/><text x="995" y="313" text-anchor="middle">Authorize devices</text><rect class="b" x="885" y="360" width="220" height="62" rx="12"/><text x="995" y="398" text-anchor="middle">Access networks</text><rect class="b" x="885" y="445" width="220" height="62" rx="12"/><text x="995" y="483" text-anchor="middle">Sign transactions</text></g><path class="a" d="M695 295 H850"/><text class="t s" x="772" y="273" text-anchor="middle">Signed assertions</text><path class="d" d="M850 365 H695"/><text class="t s" x="772" y="397" text-anchor="middle">Scoped requests</text></svg>