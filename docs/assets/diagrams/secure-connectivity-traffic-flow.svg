<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc"><title id="title">Secure connectivity and traffic flow</title><desc id="desc">A user device establishes an encrypted tunnel to the Atlas network, which applies policy and routes traffic to web applications, APIs, private resources and other users.</desc><defs><style>.t{font-family:Inter,Arial,sans-serif;fill:#121b35}.h{font-size:28px;font-weight:800}.l{font-size:20px;font-weight:700}.s{font-size:16px}.b{fill:#fff;stroke:#121b35;stroke-width:2.5}.soft{fill:#eef0ff;stroke:#5659dd;stroke-width:3}.a{stroke:#5659dd;stroke-width:4;fill:none;marker-end:url(#m)}.d{stroke:#121b35;stroke-width:3;fill:none;stroke-dasharray:8 7;marker-end:url(#mb)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#5659dd"/></marker><marker id="mb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#121b35"/></marker></defs><rect width="1200" height="680" fill="#fff"/><text class="t h" x="50" y="55">Secure Connectivity and Traffic Flow</text><rect class="b" x="55" y="210" width="190" height="245" rx="18"/><text class="t l" x="150" y="250" text-anchor="middle">Your Device</text><rect x="112" y="290" width="76" height="52" rx="5" fill="#121b35"/><rect x="125" y="348" width="50" height="7" fill="#121b35"/><rect class="soft" x="92" y="385" width="116" height="42" rx="9"/><text class="t s" x="150" y="412" text-anchor="middle">Atlas Client</text>
<path class="a" d="M245 330 H410"/><text class="t s" x="328" y="307" text-anchor="middle">Encrypted tunnel</text>
<path d="M430 355 C390 305 435 245 495 260 C510 195 610 190 635 250 C700 225 755 280 730 335 C785 360 765 430 705 435 H475 C410 435 395 385 430 355Z" fill="#f8f9fd" stroke="#121b35" stroke-width="3"/><text class="t l" x="590" y="295" text-anchor="middle">Atlas Network</text><text class="t s" x="590" y="320" text-anchor="middle">Policy · Routing · Relationship Control</text><g fill="#121b35"><rect x="485" y="355" width="62" height="42" rx="7"/><rect x="560" y="355" width="62" height="42" rx="7"/><rect x="635" y="355" width="62" height="42" rx="7"/></g>
