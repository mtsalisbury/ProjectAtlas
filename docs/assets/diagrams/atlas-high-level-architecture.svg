<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
<title id="title">Personal Internet Presence high-level architecture</title><desc id="desc">User devices connect to an Atlas client containing identity, presence, policy and secure networking functions. The client connects through the Atlas network to applications, services, organizations and other users.</desc>
