<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc"><title id="title">Atlas trust relationship model</title><desc id="desc">A person at the centre establishes separate contextual trust relationships with an employer, bank, government, network, platform and other people.</desc><defs><style>.t{font-family:Inter,Arial,sans-serif;fill:#121b35}.h{font-size:28px;font-weight:800}.l{font-size:20px;font-weight:700}.s{font-size:16px}.b{fill:#fff;stroke:#121b35;stroke-width:2.5}.line{stroke:#5659dd;stroke-width:3;stroke-dasharray:9 7;fill:none}.node{fill:#5659dd}.white{fill:#fff}</style></defs><rect width="1200" height="680" fill="#fff"/><text class="t h" x="50" y="55">Trust Relationship Model</text><circle class="node" cx="600" cy="340" r="86"/><circle cx="600" cy="315" r="20" fill="none" stroke="#fff" stroke-width="4"/><path d="M565 380 Q600 345 635 380" fill="none" stroke="#fff" stroke-width="4"/><text class="white l" x="600" y="420" text-anchor="middle">You</text>
<g class="t"><rect class="b" x="505" y="95" width="190" height="82" rx="14"/><text class="l" x="600" y="130" text-anchor="middle">Employer</text><text class="s" x="600" y="155" text-anchor="middle">Work Resources</text><rect class="b" x="100" y="250" width="190" height="82" rx="14"/><text class="l" x="195" y="285" text-anchor="middle">Bank</text><text class="s" x="195" y="310" text-anchor="middle">Financial</text><rect class="b" x="910" y="250" width="190" height="82" rx="14"/><text class="l" x="1005" y="285" text-anchor="middle">Government</text><text class="s" x="1005" y="310" text-anchor="middle">Services</text><rect class="b" x="120" y="445" width="190" height="82" rx="14"/><text class="l" x="215" y="480" text-anchor="middle">Network</text><text class="s" x="215" y="505" text-anchor="middle">ISP / Wi-Fi</text><rect class="b" x="890" y="445" width="190" height="82" rx="14"/><text class="l" x="985" y="480" text-anchor="middle">Platform</text><text class="s" x="985" y="505" text-anchor="middle">Cloud / SaaS</text><rect class="b" x="505" y="520" width="190" height="82" rx="14"/><text class="l" x="600" y="555" text-anchor="middle">Other People</text><text class="s" x="600" y="580" text-anchor="middle">Atlas Users</text></g>
<path class="line" d="M600 254 V177"/><path class="line" d="M520 300 L290 291"/><path class="line" d="M680 300 L910 291"/><path class="line" d="M535 395 L310 486"/><path class="line" d="M665 395 L890 486"/><path class="line" d="M600 426 V520"/>
<g class="t s"><text x="630" y="220">Contextual trust</text><text x="342" y="276">Selective claims</text><text x="750" y="276">Selective claims</text><text x="344" y="445">Network policy</text><text x="758" y="445">Service policy</text><text x="628" y="480">Peer relationship</text></g><text class="t s" x="600" y="650" text-anchor="middle">Each relationship is independently scoped, consented, auditable and revocable.</text></svg>